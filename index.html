<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EscapeOps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/styles/main.css" />
  <link rel="stylesheet" href="./src/styles/themes.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════
       SELECT SCREEN — Split room picker
       ═══════════════════════════════════════ -->
  <main id="screen-select" class="screen active">

    <header class="select-topbar">
      <span class="select-topbar__logo">EscapeOps</span>
      <span class="select-topbar__sub">בחר חדר להפעלה</span>
    </header>

    <div class="split-container">

      <!-- Elm Street panel -->
      <button class="split-panel split-panel--elm" data-room-id="elm" aria-label="אלם סטריט">
        <div class="panel-bg panel-bg--elm"></div>
        <div id="elm-panel-particles" class="panel-particle-layer"></div>
        <div class="panel-content">
          <div class="panel-icon">🔪</div>
          <div class="panel-title-en">Elm<br>Street</div>
          <div class="panel-divider"></div>
          <div class="panel-title-he">אלם סטריט</div>
          <ul class="panel-meta">
            <li>4 שלבים</li>
            <li>60 דקות</li>
            <li>מפחיד גבוה</li>
          </ul>
          <div class="panel-tap">התחל ›</div>
        </div>
      </button>

      <!-- Slash divider -->
      <div class="split-slash" aria-hidden="true"></div>

      <!-- The Butchery panel -->
      <button class="split-panel split-panel--katzia" data-room-id="katzia" aria-label="הקצביה">
        <div class="panel-bg panel-bg--katzia"></div>
        <div id="katzia-panel-particles" class="panel-particle-layer"></div>
        <div class="panel-content">
          <div class="panel-icon">🥩</div>
          <div class="panel-title-en">The<br>Butchery</div>
          <div class="panel-divider"></div>
          <div class="panel-title-he">הקצביה</div>
          <ul class="panel-meta">
            <li>3 שלבים</li>
            <li>60 דקות</li>
            <li>קריפי-מציאותי</li>
          </ul>
          <div class="panel-tap">‹ התחל</div>
        </div>
      </button>

    </div>
  </main>

  <!-- ═══════════════════════════════════════
       TIMER SCREEN
       ═══════════════════════════════════════ -->
  <main id="screen-timer" class="screen">
    <section class="container">
      <header class="topbar">
        <button id="btn-back" class="secondary">חזרה</button>
        <h2 id="room-name"></h2>
        <button id="btn-mute" class="secondary">🔔</button>
      </header>

      <div id="room-banner" class="room-banner" aria-hidden="true"></div>

      <div id="alerts"></div>

      <div class="timer-wrapper" id="timer-wrapper" data-status="good">
        <svg class="timer-ring" viewBox="0 0 200 200" width="224" height="224" aria-hidden="true">
          <circle class="ring-track" cx="100" cy="100" r="88"/>
          <circle id="ring-progress" class="ring-progress" cx="100" cy="100" r="88"/>
        </svg>
        <div class="timer-center">
          <div id="timer-value" class="timer-big">00:00</div>
          <div class="dual">נותר: <span id="remaining-value">60:00</span></div>
          <div id="status-text" class="status good">בזמן</div>
        </div>
      </div>

      <article class="card">
        <h3 id="stage-title"></h3>
        <p id="stage-deadline"></p>
        <p id="next-expected"></p>
      </article>

      <section id="stage-timeline" class="stage-list card"></section>

      <div class="controls">
        <button id="btn-start-pause" class="primary">התחל</button>
        <button id="btn-reset" class="secondary">איפוס/סיכום</button>
        <button id="notes-toggle" class="secondary">הערות מפעיל</button>
      </div>

      <section id="notes-panel" class="card"></section>
    </section>

    <div class="sticky">
      <button id="btn-advance">עברנו לחדר הבא</button>
    </div>
  </main>

  <!-- Summary Modal -->
  <dialog id="summary-modal">
    <div id="summary-body"></div>
    <div class="controls">
      <button id="quick-restart" class="primary">התחלה מהירה לאותו חדר</button>
      <button id="close-summary" class="secondary">סגור וחזור לבחירה</button>
    </div>
  </dialog>

  <!-- Floating operator tip -->
  <div id="tip-float" class="tip-float" aria-live="polite">
    <span class="tip-float__icon">💡</span>
    <div class="tip-float__body">
      <div class="tip-float__label">טיפ מפעיל</div>
      <div id="tip-float-text" class="tip-float__text"></div>
    </div>
    <button id="tip-float-close" class="tip-float__close" aria-label="סגור טיפ">✕</button>
  </div>

  <!-- Particle layer (timer screen atmosphere) -->
  <div id="particle-layer" class="particle-layer" aria-hidden="true"></div>

  <!-- Room-select transition overlay -->
  <div id="transition-overlay" class="transition-overlay" aria-hidden="true"></div>

  <div id="toast" class="toast"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
